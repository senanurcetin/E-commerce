name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dbt-parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt DuckDB adapter
        run: |
          python -m pip install --upgrade pip
          pip install dbt-duckdb

      - name: Install dbt packages
        run: dbt deps --profiles-dir .github/dbt-profiles

      - name: Parse dbt project
        run: dbt parse --profiles-dir .github/dbt-profiles
