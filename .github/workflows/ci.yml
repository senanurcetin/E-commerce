name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt DuckDB adapter
        run: |
          python -m pip install --upgrade pip
          pip install dbt-duckdb

      - name: Install dbt packages
        run: dbt deps --profiles-dir .github/dbt-profiles

      - name: Parse project (validates all SQL and YAML)
        run: dbt parse --profiles-dir .github/dbt-profiles

      - name: Load seed data (57 sample rows across 4 tables)
        run: dbt seed --profiles-dir .github/dbt-profiles

      - name: Run all 10 models (staging + intermediate + marts)
        run: dbt run --profiles-dir .github/dbt-profiles

      - name: Run 57 data quality tests (model layer only)
        run: dbt test --profiles-dir .github/dbt-profiles --exclude "source:*"
