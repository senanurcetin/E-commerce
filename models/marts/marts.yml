version: 2

models:
  - name: dim_user
    description: User dimension table enriched with demographic segmentation.
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['m', 'f', 'unknown']
      - name: age_segment
        tests:
          - accepted_values:
              arguments:
                values: ['18-24', '25-34', '35-44', '45+', 'unknown']

  - name: dim_products
    description: Product dimension table for category and brand analysis.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: retail_price
        tests:
          - not_null
      - name: cost
        tests:
          - not_null

  - name: fct_marketing_web_performance
    description: Session-level fact table for web performance and traffic source analysis.
    columns:
      - name: session_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_user')
                field: user_id
      - name: traffic_source
        tests:
          - not_null

  - name: fct_order_marketing
    description: Order-level fact table for revenue and marketing performance analysis.
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_user')
                field: user_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: order_item_status
        tests:
          - accepted_values:
              arguments:
                values: ['complete', 'processing', 'returned', 'cancelled', 'shipped', 'unknown']