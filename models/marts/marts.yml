version: 2

models:

  - name: dim_user
    description: User dimension table enriched with demographic segmentation.
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['m', 'f', 'unknown']

      - name: age_segment
        tests:
          - accepted_values:
              arguments:
                values: ['18-24', '25-34', '35-44', '45+', 'unknown']

      - name: signup_channel_group
        tests:
          - accepted_values:
              arguments:
                values: ['paid', 'owned', 'organic', 'other']


  - name: dim_products
    description: Product dimension table for category and brand analysis.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: retail_price
        tests:
          - not_null

      - name: cost
        tests:
          - not_null


  - name: fct_marketing_web_performance
    description: Session-level fact table for web performance and traffic analysis.
    columns:

      - name: session_sk
        tests:
          - not_null
          - unique

      - name: session_id
        tests:
          - not_null

      # ❗ user_id artık null olabilir → test YOK
      - name: user_id
        description: Can be null for anonymous sessions.

      - name: channel_group
        tests:
          - accepted_values:
              arguments:
                values: ['paid', 'owned', 'organic', 'other']

      - name: session_date
        tests:
          - not_null

      - name: is_converted
        description: 1 if session includes purchase, else 0


  - name: fct_order_marketing
    description: Order-level fact table for revenue and marketing performance.
    columns:

      - name: order_item_sk
        tests:
          - not_null
          - unique

      - name: order_item_id
        tests:
          - not_null

      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_user')
                field: user_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: order_item_status
        tests:
          - accepted_values:
              arguments:
                values: ['complete', 'processing', 'returned', 'cancelled', 'shipped', 'unknown']

      - name: traffic_source
        description: Order-level attributed traffic source derived from the nearest purchase event for the same user, with signup source as fallback.

      - name: channel_group
        tests:
          - accepted_values:
              arguments:
                values: ['paid', 'owned', 'organic', 'other']

      - name: order_date
        tests:
          - not_null
